<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fafaf9;--card:#fff;--border:#e7e5e4;--text:#1a1a1a;--text2:#57534e;--text3:#a8a29e;--accent:#6366f1;--accent-bg:#eef2ff}
@media(prefers-color-scheme:dark){:root{--bg:#0d0d0d;--card:#1a1a1a;--border:#2a2a2a;--text:#e5e5e5;--text2:#999;--text3:#666;--accent:#818cf8;--accent-bg:#1e1b4b}}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:40px 20px 80px}
.logo{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:32px}
h1{font-size:32px;font-weight:700;letter-spacing:-.02em;line-height:1.2;margin-bottom:8px}
.intro{font-size:16px;color:var(--text2);line-height:1.6;margin-bottom:40px}
.section-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.card{display:block;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;text-decoration:none;color:var(--text);transition:all .2s;margin-bottom:10px}
.card:hover,.card:active{border-color:var(--accent);transform:translateY(-1px)}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-title{font-size:17px;font-weight:600}
.card-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;background:var(--accent-bg);color:var(--accent);text-transform:uppercase;letter-spacing:.04em}
.card-desc{font-size:14px;color:var(--text2);line-height:1.5}
.card-meta{font-size:12px;color:var(--text3);margin-top:8px}
.empty{padding:40px;text-align:center;color:var(--text3);font-size:14px;border:1px dashed var(--border);border-radius:14px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Study Hub</div>
  <h1>Revision tools</h1>
  <p class="intro">Interactive study apps for exam preparation. Tap any module to start.</p>

  <p class="section-label">IGCSE Physics</p>
  <a class="card" href="space-physics/">
    <div class="card-top">
      <span class="card-title">Space physics</span>
      <span class="card-badge">Section 7</span>
    </div>
    <p class="card-desc">Full revision: diagnostic, targeted review, and 30 exam-style questions with explanations.</p>
    <p class="card-meta">10 topics &middot; 30 questions &middot; ~45 min</p>
  </a>

  <div class="empty">More modules coming soon</div>
</div>
</body>
</html>
